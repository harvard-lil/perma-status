version: 2

updates:
  # The daily regenerate workflow; SHA-pinned via `pinact run`.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Python dependencies, managed by uv via pyproject.toml + uv.lock.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
